worker_processes 1;
events {
  worker_connections 1024;
}

http {
  server {
    listen 8080;

    # OTLP HTTP trace ingestion — matches the path our app's OTLPTraceExporter posts to.
    location /v1/traces {
      proxy_pass http://127.0.0.1:4318/v1/traces;
      proxy_set_header Host $host;
    }

    # Everything else: Jaeger's UI and its own query API.
    location / {
      proxy_pass http://127.0.0.1:16686;
      proxy_set_header Host $host;
    }
  }
}